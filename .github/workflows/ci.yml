name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake pkg-config libz-dev curl protobuf-compiler

    - name: Install mise
      uses: jdx/mise-action@v2
      with:
        install: true

    - name: Run just check
      run: just check
