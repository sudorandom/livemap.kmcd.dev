name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build ${{ matrix.arch_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            arch_name: linux_amd64
            ext: ""
            cgo_enabled: 1
          - os: ubuntu-24.04
            rust_target: aarch64-unknown-linux-gnu
            goos: linux
            goarch: arm64
            arch_name: linux_arm64
            ext: ""
            cgo_enabled: 1
            cross: true
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            arch_name: darwin_arm64
            ext: ""
            cgo_enabled: 1
          - os: macos-13
            rust_target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
            arch_name: darwin_amd64
            ext: ""
            cgo_enabled: 1
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            arch_name: windows_amd64
            ext: ".exe"
            cgo_enabled: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux dependencies (x86_64)
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libasound2-dev pkg-config

      - name: Install Linux Cross-Compilation Dependencies (arm64)
        if: runner.os == 'Linux' && matrix.cross
        run: |
          sudo dpkg --add-architecture arm64

          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/g' /etc/apt/sources.list.d/ubuntu.sources

          echo "Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg" | sudo tee /etc/apt/sources.list.d/arm64.sources
          
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libgl1-mesa-dev:arm64 \
            libxcursor-dev:arm64 \
            libxrandr-dev:arm64 \
            libxinerama-dev:arm64 \
            libxi-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libasound2-dev:arm64

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      - name: Build Go Frontend (bgp-viewer)
        shell: bash
        run: |
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          export CGO_ENABLED=${{ matrix.cgo_enabled }}
          if [ "${{ matrix.cross }}" == "true" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          fi
          # Using mise to ensure it uses the versions specified in .mise.toml
          mise exec -- go build -tags=ebitengine -o build/bgp-viewer${{ matrix.ext }} ./cmd/bgp-viewer

      - name: Build Rust Backend (livemap)
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" == "true" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          mise exec -- cargo build --release --target ${{ matrix.rust_target }}
          mkdir -p build
          cp target/${{ matrix.rust_target }}/release/livemap${{ matrix.ext }} build/

      - name: Create Archive
        shell: bash
        run: |
          # Copy necessary runtime assets to the build folder
          if [ -d "assets" ]; then
            mkdir -p build/assets
            cp -r assets/* build/assets/
          fi
          if [ -f "README.md" ]; then
            cp README.md build/
          fi
          
          cd build
          
          # Only include assets and README if they were copied
          INCLUDE_FILES="bgp-viewer${{ matrix.ext }} livemap${{ matrix.ext }}"
          if [ -d "assets" ]; then INCLUDE_FILES="$INCLUDE_FILES assets"; fi
          if [ -f "README.md" ]; then INCLUDE_FILES="$INCLUDE_FILES README.md"; fi

          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a ../livemap_${{ matrix.arch_name }}.zip $INCLUDE_FILES
          else
            tar -czvf ../livemap_${{ matrix.arch_name }}.tar.gz $INCLUDE_FILES
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            livemap_${{ matrix.arch_name }}.*
