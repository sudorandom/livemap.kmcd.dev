syntax = "proto3";

package historical.v1;

option go_package = "github.com/sudorandom/bgp-stream/pkg/livemap/historical/v1";

message DailyAsnArchive {
    uint32 asn = 1;
    string name = 2;
    string org = 3;
    repeated PrefixHistory prefixes = 4;
}

message PrefixHistory {
    string prefix = 1;
    repeated Transition events = 2;
}

message Transition {
    int32 old_state = 1;
    int32 new_state = 2;
    int64 ts = 3;
    string incident_id = 4;
    HistLeakDetail leak_detail = 5;
    string anomaly_details = 6;
    int32 rpki_status = 7;
}

message HistLeakDetail {
    string leak_type = 1;
    uint32 leaker_asn = 2;
    string leaker_name = 3;
    uint32 victim_asn = 4;
    string victim_name = 5;
    int32 leaker_rpki_status = 6;
    int32 victim_rpki_status = 7;
}

message DaySummary {
    int64 date = 1; // Unix timestamp for start of day
    uint32 total_transitions = 2;
    uint32 unique_asns = 3;
    uint32 unique_prefixes = 4;
    repeated HistTransitionSummary latest_events = 5;
    uint32 unique_orgs = 6;

    uint32 ipv4_prefix_count = 7;
    uint32 ipv6_prefix_count = 8;
    uint64 ipv4_count = 9;

    uint64 rpki_valid_ipv4 = 10;
    uint64 rpki_invalid_ipv4 = 11;
    uint64 rpki_not_found_ipv4 = 12;

    uint64 rpki_valid_ipv6 = 13;
    uint64 rpki_invalid_ipv6 = 14;
    uint64 rpki_not_found_ipv6 = 15;

    repeated HistFlappiestNetwork flappiest_networks = 16;
    repeated HistAlert top_alerts = 17;
    repeated HistClassificationCount classification_counts = 18;
}

message HistClassificationCount {
    int32 classification = 1;
    uint32 count = 2;
    float messages_per_second = 3;
    uint32 asn_count = 4;
    uint32 prefix_count = 5;
    uint32 ipv4_prefix_count = 6;
    uint32 ipv6_prefix_count = 7;
    uint64 ipv4_count = 8;
    uint64 total_count = 9;
}

message HistAlertLocation {
    string city = 1;
    string country = 2;
    float lat = 3;
    float lon = 4;
    float radius_km = 5;
}

message HistAlert {
    int32 alert_type = 1;
    HistAlertLocation location = 2;
    uint32 asn = 3;
    string country = 4;
    int32 classification = 5;
    uint32 events_count = 6;
    int32 delta = 7;
    int64 timestamp = 8;
    uint64 impacted_ipv4_ips = 9;
    uint32 impacted_ipv6_prefixes = 10;
    float percentage_increase = 11;
    string as_name = 12;
    string organization = 13;
    uint32 asn_count = 14;
    float anomaly_score = 15;
}

message HistFlappiestNetwork {
    uint32 asn = 1;
    string network_name = 2;
    float event_rate = 3;
    uint32 flap_count = 4;
    string prefix = 5;
}

message HistTransitionSummary {
    uint32 asn = 1;
    string asn_name = 2;
    string org = 3;
    string prefix = 4;
    int32 old_state = 5;
    int32 new_state = 6;
    int64 ts = 7;
    int32 rpki_status = 8;
}

message OrgArchive {
    string org = 1;
    repeated uint32 asns = 2;
    uint32 event_count = 3;
}

message AsnMetadata {
    uint32 asn = 1;
    string name = 2;
    string org = 3;
    int32 rpki_status = 4;
}

message OrgMetadata {
    string name = 1;
    string slug = 2;
}

message PrefixSnapshot {
    string prefix = 1;
    int32 classification = 2;
    uint32 asn = 3;
    int64 last_update_ts = 4;
    uint32 total_events = 5;
}

message GlobalMetadataIndex {
    repeated AsnMetadata asns = 1;
    repeated OrgMetadata orgs = 2;
}

message GlobalPrefixShard {
    repeated PrefixSnapshot snapshots = 1;
}
