syntax = "proto3";

package livemap;

enum Classification {
    NONE = 0;
    BOGON = 1;
    HIJACK = 2;
    ROUTE_LEAK = 3;
    OUTAGE = 4;
    DDOS_MITIGATION = 5;
    FLAP = 6;
    TRAFFIC_ENGINEERING = 7;
    PATH_HUNTING = 8;
    DISCOVERY = 9;
}

message GeoData {
    float lat = 1;
    float lon = 2;
}

message AggregatedEvent {
    GeoData geo = 1;
    Classification classification = 2;
    uint32 count = 3;
}

message StreamEventsResponse {
    repeated AggregatedEvent events = 1;
}

message StreamEventsRequest {}

message SummaryRequest {}

message ClassificationCount {
    Classification classification = 1;
    uint32 count = 2; // windowed count for trendlines
    float messages_per_second = 3;
    uint32 asn_count = 4;
    uint32 prefix_count = 5;
    uint32 ipv4_prefix_count = 7;
    uint32 ipv6_prefix_count = 8;
    uint64 ipv4_count = 9;
    uint64 total_count = 10; // global cumulative total
}

message SummaryResponse {
    float messages_per_second = 1;
    uint32 asn_count = 2;
    uint32 prefix_count = 3;
    repeated ClassificationCount classification_counts = 5;
    uint32 ipv4_prefix_count = 6;
    uint32 ipv6_prefix_count = 7;
    uint64 ipv4_count = 8;
    uint32 input_channel_len = 9;
    uint32 input_channel_capacity = 10;
    uint32 max_lag_seconds = 11;
    bool loading_historical = 12;
}

message StateTransition {
    string incident_id = 1;
    string prefix = 2;
    uint32 asn = 3;
    string as_name = 4;
    GeoData geo = 5;
    string city = 6;
    string country = 7;
    Classification new_state = 8;
    Classification old_state = 9;
    int64 start_time = 10;
    int64 end_time = 11;
}

message StreamStateTransitionsRequest {
    repeated Classification target_states = 1;
}

message StreamStateTransitionsResponse {
    StateTransition transition = 1;
}

service LiveMap {
    rpc SubscribeEvents(StreamEventsRequest) returns (stream StreamEventsResponse);
    rpc GetSummary(SummaryRequest) returns (SummaryResponse);
    rpc StreamStateTransitions(StreamStateTransitionsRequest) returns (stream StreamStateTransitionsResponse);
}
