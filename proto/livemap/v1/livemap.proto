syntax = "proto3";

package livemap.v1;

option go_package = "github.com/sudorandom/bgp-stream/pkg/livemap/v1";

// Classification defines the types of BGP anomalies or events.
enum Classification {
    CLASSIFICATION_UNSPECIFIED = 0;
    CLASSIFICATION_BOGON = 1;
    CLASSIFICATION_HIJACK = 2;
    CLASSIFICATION_ROUTE_LEAK = 3;
    CLASSIFICATION_OUTAGE = 4;
    CLASSIFICATION_DDOS_MITIGATION = 5;
    CLASSIFICATION_FLAP = 6;
    CLASSIFICATION_PATH_HUNTING = 8;
    CLASSIFICATION_DISCOVERY = 9;
    CLASSIFICATION_MINOR_ROUTE_LEAK = 10;
}

// GeoData represents geographic coordinates.
message GeoData {
    float lat = 1;
    float lon = 2;
}

// AggregatedEvent represents multiple events aggregated by location and type.
message AggregatedEvent {
    GeoData geo = 1;
    Classification classification = 2;
    uint32 count = 3;
}

// SubscribeEventsResponse is the response for event subscription.
message SubscribeEventsResponse {
    repeated AggregatedEvent events = 1;
}

// SubscribeEventsRequest is the request for event subscription.
message SubscribeEventsRequest {}

// GetSummaryRequest is the request for global summary statistics.
message GetSummaryRequest {}

// ClassificationCount contains statistics for a specific classification.
message ClassificationCount {
    Classification classification = 1;
    uint32 count = 2; // windowed count for trendlines
    float messages_per_second = 3;
    uint32 asn_count = 4;
    uint32 prefix_count = 5;
    uint32 ipv4_prefix_count = 7;
    uint32 ipv6_prefix_count = 8;
    uint64 ipv4_count = 9;
    uint64 total_count = 10; // global cumulative total
}

// CompositionEntry represents a segment of the event composition (e.g. BEACON, RESEARCH, ORGANIC).
message CompositionEntry {
    string type = 1;
    float percentage = 2;
}

// GetSummaryResponse contains global and per-classification statistics.
message GetSummaryResponse {
    float messages_per_second = 1;
    uint32 asn_count = 2;
    uint32 prefix_count = 3;
    repeated ClassificationCount classification_counts = 5;
    uint32 ipv4_prefix_count = 6;
    uint32 ipv6_prefix_count = 7;
    uint64 ipv4_count = 8;
    uint32 input_channel_len = 9;
    uint32 input_channel_capacity = 10;
    uint32 max_lag_seconds = 11;
    bool loading_historical = 12;
    repeated CompositionEntry event_composition = 13;
    RPKIStatus last_rpki_status = 14;

    // Top stats
    FlappiestNetworkStats flappiest_network_stats = 23;
    string largest_org_name = 18;
    uint64 largest_org_ipv4_count = 19;
    uint64 rpki_valid_ipv4 = 20;
    uint64 rpki_invalid_ipv4 = 21;
    uint64 rpki_not_found_ipv4 = 22;
    uint64 rpki_valid_ipv6 = 24;
    uint64 rpki_invalid_ipv6 = 25;
    uint64 rpki_not_found_ipv6 = 26;
}

message FlappiestNetworkStats {
    uint32 asn = 1;
    string network_name = 2;
    float event_rate = 3;
    uint32 flap_count = 4; // cumulative count in the last 24 hours
    string prefix = 5;
}

// RPKIStatus defines the validation status of a prefix.
enum RPKIStatus {
    RPKI_STATUS_UNSPECIFIED = 0;
    RPKI_STATUS_VALID = 1;
    RPKI_STATUS_INVALID = 2;
    RPKI_STATUS_NOT_FOUND = 3;
}

// LeakDetail contains information specific to route leaks.
message LeakDetail {
    uint32 leak_type = 1; 
    uint32 leaker_asn = 2;
    uint32 victim_asn = 3;
    string leaker_as_name = 4;
    string victim_as_name = 5;
    RPKIStatus leaker_rpki_status = 6;
    RPKIStatus victim_rpki_status = 7;
}

// StateTransition represents a change in classification for a prefix.
message StateTransition {
    string incident_id = 1;
    string prefix = 2;
    uint32 asn = 3;
    string as_name = 4;
    GeoData geo = 5;
    string city = 6;
    string country = 7;
    Classification new_state = 8;
    Classification old_state = 9;
    int64 start_time = 10;
    int64 end_time = 11;
    LeakDetail leak_detail = 12;
}

// Aggregation method for alerts.
enum AlertType {
    ALERT_TYPE_UNSPECIFIED = 0;
    ALERT_TYPE_BY_LOCATION = 1;
    ALERT_TYPE_BY_ASN = 2;
    ALERT_TYPE_BY_COUNTRY = 3;
    ALERT_TYPE_BY_ORGANIZATION = 4;
}

message AlertLocation {
    string city = 1;
    string country = 2;
    float lat = 3;
    float lon = 4;
    float radius_km = 5;
}

// Alert represents a significant spike in anomalies.
message Alert {
    AlertType alert_type = 1;
    AlertLocation location = 2; // Can be a radius, a city name, or just a generic string representing the area.
    uint32 asn = 3;
    string country = 4;
    Classification classification = 5;
    uint32 events_count = 6;
    int32 delta = 7; // Change in count over the last 5 minutes
    int64 timestamp = 8;
    uint64 impacted_ipv4_ips = 9;
    uint32 impacted_ipv6_prefixes = 10;
    float percentage_increase = 11;
    string as_name = 12;
    string organization = 13;
    uint32 asn_count = 14;
    float anomaly_score = 15;
}

message StreamAlertsRequest {}

message StreamAlertsResponse {
    Alert alert = 1;
}

// StreamStateTransitionsRequest is the request for state transition updates.
message StreamStateTransitionsRequest {
    repeated Classification target_states = 1;
}

// StreamStateTransitionsResponse is the response for state transition updates.
message StreamStateTransitionsResponse {
    StateTransition transition = 1;
}

// LiveMapService provides BGP visualization data.
service LiveMapService {
    rpc SubscribeEvents(SubscribeEventsRequest) returns (stream SubscribeEventsResponse);
    rpc GetSummary(GetSummaryRequest) returns (GetSummaryResponse);
    rpc StreamStateTransitions(StreamStateTransitionsRequest) returns (stream StreamStateTransitionsResponse);
    rpc StreamAlerts(StreamAlertsRequest) returns (stream StreamAlertsResponse);
}
