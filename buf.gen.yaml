version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      value: github.com/sudorandom/bgp-stream/pkg/livemap
plugins:
  - local: protoc-gen-go
    out: pkg/livemap
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: pkg/livemap
    opt: paths=source_relative
